version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens -d alphalens"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
